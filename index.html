body{

.topbar{
    background:black;

.container{

.main-card{
    position:relative;

    border-radius:25px;
    border:2px solid #ff2d7a;
    cursor:pointer;
}

.main-card img{
    width:100%;
    display:block;

.play{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:120px;
    height:120px;
    border-radius:50%;
    background:#ff007f;
    display:flex;
    justify-content:center;
    align-items:center;
    animation:pulse 1.5s infinite;
}

.play:before{
    content:'';
    border-left:38px solid white;
    border-top:25px solid transparent;
    border-bottom:25px solid transparent;
    margin-left:8px;
}

@keyframes pulse{
    0%{transform:translate(-50%,-50%) scale(1);}
    50%{transform:translate(-50%,-50%) scale(1.1);}
    100%{transform:translate(-50%,-50%) scale(1);}
}

.timer{
    position:absolute;
    right:15px;
    bottom:15px;
    background:rgba(0,0,0,0.7);
    padding:8px 14px;
    border-radius:10px;
    font-size:24px;
}

.title{
    text-align:center;

.desc{

}

.btn{
    display:block;
    width:100%;
    text-align:center;
    margin-top:25px;
    background:#ff2d7a;
    padding:28px;
    border-radius:22px;
    color:white;
    text-decoration:none;
    font-size:30px;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.03);
}

.banner{
    margin:35px 0;
}

.banner img{
    width:100%;
    border-radius:10px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
}

.grid img{
    width:100%;
    border-radius:20px;
    border:3px solid #ff2d7a;
}

.check{
    margin-top:45px;
    text-align:center;
    color:#ddd;
    font-size:22px;
    line-height:1.8;
}

@media(max-width:600px){

.timer{
